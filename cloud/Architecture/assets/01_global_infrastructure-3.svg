    <path d="M 272,16 A 16,16 0,0,0 272,32" class="nofill"></path>
    <text x="274" y="28" >REC</text>
    <path d="M 296,16 A 16,16 0,0,1 296,32" class="nofill"></path>
    <text x="330" y="12" >Cache</text>
    <text x="410" y="12" >Origin</text>
    <path d="M 408,16 A 16,16 0,0,0 408,32" class="nofill"></path>
    <text x="410" y="28" >Region</text>
    <path d="M 456,16 A 16,16 0,0,1 456,32" class="nofill"></path>
