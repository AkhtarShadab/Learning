        <line x1="40" y1="8" x2="56" y2="8" class="solid"></line>
        <polygon points="56,4 64,8 56,12" class="filled"></polygon>
    </g>
    <g>
        <line x1="184" y1="8" x2="200" y2="8" class="solid"></line>
        <polygon points="200,4 208,8 200,12" class="filled"></polygon>
