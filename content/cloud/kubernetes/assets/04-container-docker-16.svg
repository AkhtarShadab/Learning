    <path d="M 80,48 A 16,16 0,0,0 80,64" class="nofill"></path>
    <text x="82" y="60" >COPY</text>
    <text x="122" y="60" >.</text>
    <text x="138" y="60" >.</text>
    <path d="M 144,48 A 16,16 0,0,1 144,64" class="nofill"></path>
    <text x="170" y="60" >→</text>
    <text x="194" y="60" >Layer</text>
    <text x="242" y="60" >N</text>
    <line x1="248" y1="56" x2="256" y2="56" class="solid"></line>
    <text x="258" y="60" >1</text>
    <path d="M 280,48 A 16,16 0,0,0 280,64" class="nofill"></path>
    <text x="282" y="60" >RUN</text>
    <text x="314" y="60" >npm</text>
    <text x="346" y="60" >ci</text>
    <path d="M 360,48 A 16,16 0,0,1 360,64" class="nofill"></path>
    <text x="386" y="60" >→</text>
    <text x="410" y="60" >Layer</text>
    <text x="458" y="60" >N</text>
    <line x1="464" y1="56" x2="472" y2="56" class="solid"></line>
    <text x="474" y="60" >2</text>
    <path d="M 496,48 A 16,16 0,0,0 496,64" class="nofill"></path>
    <text x="498" y="60" >FROM</text>
    <text x="538" y="60" >node:alpine</text>
    <path d="M 624,48 A 16,16 0,0,1 624,64" class="nofill"></path>
    <text x="650" y="60" >→</text>
    <text x="674" y="60" >NULL</text>
    <g>
        <line x1="20" y1="16" x2="20" y2="36" class="solid"></line>
        <polygon points="16,36 24,36 20,48" class="filled"></polygon>
    </g>
</svg>