<svg xmlns="http://www.w3.org/2000/svg" width="656" height="176" style="background:#ffffff;border:1px solid #e5e5e5;border-radius:8px;max-width:100%;height:auto"><rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
    <style>
