<svg xmlns="http://www.w3.org/2000/svg" width="552" height="176" style="background:#ffffff;border:1px solid #e5e5e5;border-radius:8px;max-width:100%;height:auto"><rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
    <style>
        line, path, circle, rect, polygon{stroke:black;stroke-width:2;stroke-opacity:1;fill-opacity:1;stroke-linecap:round;stroke-linejoin:miter;}text{font-family:Iosevka Fixed, monospace;font-size:14px;}rect.backdrop{stroke:none;fill:transparent;}.broken{stroke-dasharray:8;}.filled{fill:black;}.bg_filled{fill:transparent;}.nofill{fill:transparent;}.end_marked_arrow{marker-end:url(#arrow);}.start_marked_arrow{marker-start:url(#arrow);}.end_marked_diamond{marker-end:url(#diamond);}.start_marked_diamond{marker-start:url(#diamond);}.end_marked_circle{marker-end:url(#circle);}.start_marked_circle{marker-start:url(#circle);}.end_marked_open_circle{marker-end:url(#open_circle);}.start_marked_open_circle{marker-start:url(#open_circle);}.end_marked_big_open_circle{marker-end:url(#big_open_circle);}.start_marked_big_open_circle{marker-start:url(#big_open_circle);}
        <!--separator-->
        
    </style>
    <defs>
        <marker id="arrow" viewBox="-2 -2 8 8" refX="4" refY="2" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <polygon points="0,0 0,4 4,2 0,0"></polygon>
        </marker>
        <marker id="diamond" viewBox="-2 -2 8 8" refX="4" refY="2" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <polygon points="0,2 2,0 4,2 2,4 0,2"></polygon>
        </marker>
        <marker id="circle" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <circle cx="4" cy="4" r="2" class="filled"></circle>
        </marker>
        <marker id="open_circle" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <circle cx="4" cy="4" r="2" class="bg_filled"></circle>
        </marker>
        <marker id="big_open_circle" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <circle cx="4" cy="4" r="3" class="bg_filled"></circle>
        </marker>
    </defs>
    <rect class="backdrop" x="0" y="0" width="552" height="176"></rect>
    <text x="18" y="12" >ACTIVE</text>
    <line x1="64" y1="8" x2="72" y2="8" class="solid"></line>
    <text x="74" y="12" >PASSIVE</text>
    <line x1="16" y1="22" x2="136" y2="22" class="solid"></line>
    <line x1="16" y1="26" x2="136" y2="26" class="solid"></line>
    <text x="18" y="60" >Traffic</text>
    <text x="114" y="60" >[Primary]</text>
    <line x1="148" y1="64" x2="148" y2="80" class="solid"></line>
    <text x="114" y="92" >[Standby]</text>
    <path d="M 208,80 A 16,16 0,0,0 208,96" class="nofill"></path>
    <text x="210" y="92" >idle,</text>
    <text x="258" y="92" >synchronized,</text>
    <text x="370" y="92" >ready</text>
    <path d="M 408,80 A 16,16 0,0,1 408,96" class="nofill"></path>
    <text x="18" y="124" >Normal:</text>
    <text x="82" y="124" >Primary</text>
    <text x="146" y="124" >handles</text>
    <text x="210" y="124" >100%</text>
    <text x="18" y="140" >Failure:</text>
    <text x="90" y="140" >Standby</text>
    <text x="154" y="140" >takes</text>
    <text x="202" y="140" >over</text>
    <path d="M 248,128 A 16,16 0,0,0 248,144" class="nofill"></path>
    <text x="250" y="140" >failover</text>
    <text x="18" y="156" >Cost:</text>
    <text x="66" y="156" >2x</text>
    <text x="90" y="156" >resources</text>
    <text x="170" y="156" >but</text>
    <text x="202" y="156" >standby</text>
    <text x="266" y="156" >is</text>
    <text x="322" y="140" >time:</text>
    <text x="370" y="140" >seconds</text>
    <text x="434" y="140" >to</text>
    <text x="458" y="140" >minutes</text>
    <path d="M 512,128 A 16,16 0,0,1 512,144" class="nofill"></path>
    <text x="362" y="156" >during</text>
    <text x="418" y="156" >normal</text>
    <text x="474" y="156" >operation</text>
    <text x="290" y="156" >wasted</text>
    <g>
        <line x1="80" y1="56" x2="96" y2="56" class="solid"></line>
        <polygon points="96,52 104,56 96,60" class="filled"></polygon>
    </g>
</svg>